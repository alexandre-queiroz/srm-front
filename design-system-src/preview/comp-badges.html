<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 10px;
        font-size: 11.5px;
        font-weight: 500;
        border-radius: 999px;
        line-height: 1.4;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 10.5px;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        min-width: 110px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="t-eyebrow">Status badges · status de operação de duplicata</div>

      <div class="row">
        <div class="label">Em fluxo</div>
        <span class="badge" style="background: #eef3fb; color: #173e72"><span class="dot" style="background: #2461af"></span>Enviado</span>
        <span class="badge" style="background: #fdf6e1; color: #6e4c00"
          ><span class="dot" style="background: #b57e00"></span>Em análise</span
        >
        <span class="badge" style="background: #eef3fb; color: #173e72"
          ><span class="dot" style="background: #2461af"></span>Em processamento</span
        >
      </div>

      <div class="row">
        <div class="label">Finalizado</div>
        <span class="badge" style="background: #e8f6ee; color: #11572f"><span class="dot" style="background: #1f8a4d"></span>Aprovado</span>
        <span class="badge" style="background: #e8f6ee; color: #11572f"
          ><span class="dot" style="background: #1f8a4d"></span>Liquidado</span
        >
        <span class="badge" style="background: #fceded; color: #7c1518"
          ><span class="dot" style="background: #c8252b"></span>Rejeitado</span
        >
        <span class="badge" style="background: #fceded; color: #7c1518"
          ><span class="dot" style="background: #c8252b"></span>Inadimplente</span
        >
      </div>

      <div class="row">
        <div class="label">Neutro / tag</div>
        <span class="badge" style="background: #f4f6f8; color: #353a43">FIDC Mercantil</span>
        <span class="badge" style="background: #f4f6f8; color: #353a43">Cedente verificado</span>
        <span class="badge" style="background: #fdf1e8; color: #8a3300">Novo</span>
        <span class="badge" style="background: #0b1d38; color: white">Beta</span>
      </div>

      <div class="row">
        <div class="label">Counter / numérico</div>
        <span
          class="badge"
          style="
            background: var(--srm-blue-500);
            color: white;
            font-family: var(--font-mono);
            padding: 2px 8px;
            font-variant-numeric: tabular-nums;
          "
          >23</span
        >
        <span class="badge" style="background: var(--srm-orange-500); color: white; font-family: var(--font-mono); padding: 2px 8px"
          >3 novos</span
        >
        <span class="badge" style="background: var(--srm-danger-500); color: white; font-family: var(--font-mono); padding: 2px 8px"
          >2 atrasos</span
        >
      </div>
    </div>
  </body>
</html>
