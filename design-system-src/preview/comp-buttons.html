<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      /* ============================================================
     Button system — three orthogonal props
     color    × variant × size
     primary    default    sm
     accent     secondary  md
     secondary  outline    lg
     info       ghost
     danger     link
     warning
     ============================================================ */

      .btn {
        font-family: var(--font-sans);
        font-weight: 500;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        transition:
          transform 200ms cubic-bezier(0.2, 0, 0, 1),
          box-shadow 200ms cubic-bezier(0.2, 0, 0, 1),
          background 200ms cubic-bezier(0.2, 0, 0, 1),
          color 200ms cubic-bezier(0.2, 0, 0, 1),
          border-color 200ms cubic-bezier(0.2, 0, 0, 1);
        will-change: transform, box-shadow;
      }
      .btn:hover {
        transform: translateY(-1px);
      }
      .btn:active {
        transform: translateY(0);
      }

      /* ----- color palettes (CSS custom props per .clr-* class) ----- */
      .clr-primary {
        --c-500: #2461af;
        --c-600: #1d4f8f;
        --c-50: #eef3fb;
        --c-100: #d5e2f2;
        --c-700: #173e72;
        --c-shadow: 36, 97, 175;
      }
      .clr-accent {
        --c-500: #d45200;
        --c-600: #b04200;
        --c-50: #fdf1e8;
        --c-100: #faddc4;
        --c-700: #8a3300;
        --c-shadow: 212, 82, 0;
      }
      .clr-secondary {
        --c-500: #353a43;
        --c-600: #232730;
        --c-50: #f4f6f8;
        --c-100: #e9ecf1;
        --c-700: #232730;
        --c-shadow: 11, 29, 56;
      }
      .clr-info {
        --c-500: #0e7bb5;
        --c-600: #0b6494;
        --c-50: #e0f2fe;
        --c-100: #bae0fa;
        --c-700: #094d72;
        --c-shadow: 14, 123, 181;
      }
      .clr-danger {
        --c-500: #c8252b;
        --c-600: #a41b20;
        --c-50: #fceded;
        --c-100: #f7cece;
        --c-700: #7c1518;
        --c-shadow: 200, 37, 43;
      }
      .clr-warning {
        --c-500: #b57e00;
        --c-600: #8f6300;
        --c-50: #fdf6e1;
        --c-100: #fae9b0;
        --c-700: #6e4c00;
        --c-shadow: 181, 126, 0;
      }

      /* ----- variants ----- */
      .v-default {
        background: var(--c-500);
        color: white;
        box-shadow:
          0 1px 2px rgba(var(--c-shadow), 0.18),
          0 2px 6px rgba(var(--c-shadow), 0.14);
      }
      .v-default:hover {
        background: var(--c-600);
        box-shadow:
          0 2px 4px rgba(var(--c-shadow), 0.22),
          0 8px 18px rgba(var(--c-shadow), 0.28);
      }

      .v-secondary {
        background: var(--c-50);
        color: var(--c-700);
        border-color: transparent;
      }
      .v-secondary:hover {
        background: var(--c-100);
        box-shadow: 0 2px 6px rgba(var(--c-shadow), 0.1);
      }

      .v-outline {
        background: transparent;
        color: var(--c-700);
        border-color: var(--c-500);
      }
      .v-outline:hover {
        background: var(--c-50);
        box-shadow: 0 2px 6px rgba(var(--c-shadow), 0.1);
      }

      .v-ghost {
        background: transparent;
        color: var(--c-700);
      }
      .v-ghost:hover {
        background: var(--c-50);
      }

      .v-link {
        background: transparent;
        color: var(--c-700);
        padding-left: 4px !important;
        padding-right: 4px !important;
        border-radius: 4px;
      }
      .v-link:hover {
        color: var(--c-600);
        text-decoration: underline;
        text-underline-offset: 3px;
        transform: none;
      }

      /* ----- sizes ----- */
      .sz-sm {
        padding: 7px 14px;
        font-size: 12.5px;
      }
      .sz-md {
        padding: 10px 18px;
        font-size: 14px;
      }
      .sz-lg {
        padding: 13px 24px;
        font-size: 15px;
      }

      /* ----- layout helpers in this card ----- */
      .section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .section-label {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .section-label code {
        background: var(--bg-sunken);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 10px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .matrix-head {
        font-size: 11px;
        color: var(--fg-3);
        font-family: var(--font-mono);
      }
      hr.sep {
        border: 0;
        border-top: 1px dashed var(--border-subtle);
        margin: 4px 0;
      }
      svg {
        width: 14px;
        height: 14px;
        stroke-width: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="card" style="padding: 22px 26px; gap: 18px">
      <!-- Colors row -->
      <div class="section">
        <div class="section-label">
          Color · <code>primary</code> <code>accent</code> <code>secondary</code> <code>info</code> <code>danger</code> <code>warning</code>
        </div>
        <div class="row">
          <button class="btn clr-primary v-default sz-md">Primary</button>
          <button class="btn clr-accent v-default sz-md">Accent</button>
          <button class="btn clr-secondary v-default sz-md">Secondary</button>
          <button class="btn clr-info v-default sz-md">Info</button>
          <button class="btn clr-danger v-default sz-md">Danger</button>
          <button class="btn clr-warning v-default sz-md">Warning</button>
        </div>
      </div>

      <hr class="sep" />

      <!-- Variants row (using primary color) -->
      <div class="section">
        <div class="section-label">
          Variant · <code>default</code> <code>secondary</code> <code>outline</code> <code>ghost</code> <code>link</code>
        </div>
        <div class="row">
          <button class="btn clr-primary v-default sz-md">Default</button>
          <button class="btn clr-primary v-secondary sz-md">Secondary</button>
          <button class="btn clr-primary v-outline sz-md">Outline</button>
          <button class="btn clr-primary v-ghost sz-md">Ghost</button>
          <button class="btn clr-primary v-link sz-md">Link →</button>
        </div>
      </div>

      <hr class="sep" />

      <!-- Size row -->
      <div class="section">
        <div class="section-label">Size · <code>sm</code> <code>md</code> <code>lg</code></div>
        <div class="row">
          <button class="btn clr-primary v-default sz-sm">Antecipar</button>
          <button class="btn clr-primary v-default sz-md">Antecipar duplicata</button>
          <button class="btn clr-primary v-default sz-lg">
            Enviar para análise <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M13 5l7 7-7 7" /></svg>
          </button>
        </div>
      </div>

      <hr class="sep" />

      <!-- Mini matrix: each color × outline + secondary, showing combinations work uniformly -->
      <div class="section">
        <div class="section-label">Combo examples · color × variant</div>
        <div class="row">
          <button class="btn clr-accent v-secondary sz-sm">Novo</button>
          <button class="btn clr-info v-outline sz-sm">Ver detalhes</button>
          <button class="btn clr-warning v-secondary sz-sm">Atenção</button>
          <button class="btn clr-danger v-outline sz-sm">Cancelar operação</button>
          <button class="btn clr-secondary v-ghost sz-sm">Mais opções</button>
          <button class="btn clr-primary v-link sz-sm">Saiba mais</button>
        </div>
      </div>
    </div>
  </body>
</html>
