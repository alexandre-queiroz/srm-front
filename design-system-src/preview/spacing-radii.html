<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 12px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .box {
        width: 72px;
        height: 72px;
        background: var(--srm-blue-100);
        border: 1px solid var(--srm-blue-200);
      }
      .name {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--fg-2);
      }
      .px {
        font-size: 10px;
        color: var(--fg-3);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="t-eyebrow">Border radius</div>

      <div class="grid">
        <div class="item">
          <div class="box" style="border-radius: 2px"></div>
          <div class="name">xs</div>
          <div class="px">2 px</div>
        </div>
        <div class="item">
          <div class="box" style="border-radius: 4px"></div>
          <div class="name">sm</div>
          <div class="px">4 px</div>
        </div>
        <div class="item">
          <div class="box" style="border-radius: 6px"></div>
          <div class="name">md</div>
          <div class="px">6 px · default</div>
        </div>
        <div class="item">
          <div class="box" style="border-radius: 10px"></div>
          <div class="name">lg</div>
          <div class="px">10 px · cards</div>
        </div>
        <div class="item">
          <div class="box" style="border-radius: 14px"></div>
          <div class="name">xl</div>
          <div class="px">14 px · modais</div>
        </div>
        <div class="item">
          <div class="box" style="border-radius: 20px"></div>
          <div class="name">2xl</div>
          <div class="px">20 px</div>
        </div>
        <div class="item">
          <div class="box" style="border-radius: 999px"></div>
          <div class="name">pill</div>
          <div class="px">badges</div>
        </div>
      </div>
    </div>
  </body>
</html>
