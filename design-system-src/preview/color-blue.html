<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .swatch-row {
        display: grid;
        grid-template-columns: repeat(11, 1fr);
        gap: 4px;
      }
      .sw {
        aspect-ratio: 1 / 1.1;
        border-radius: 6px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 6px;
        font-family: var(--font-mono);
        font-size: 9px;
        color: white;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
      }
      .sw.light {
        color: var(--srm-neutral-900);
      }
      .sw .v {
        opacity: 0.85;
      }
      .label {
        font-size: 12px;
        color: var(--fg-2);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-weight: 500;
      }
      .label small {
        color: var(--fg-3);
        font-family: var(--font-mono);
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div>
        <div class="label">Azul SRM <small>--srm-blue-*</small></div>
        <div class="swatch-row" style="margin-top: 8px">
          <div class="sw light" style="background: #eef3fb">
            50
            <div class="v">#EEF3FB</div>
          </div>
          <div class="sw light" style="background: #d5e2f2">
            100
            <div class="v">#D5E2F2</div>
          </div>
          <div class="sw light" style="background: #a8c0e2">
            200
            <div class="v">#A8C0E2</div>
          </div>
          <div class="sw light" style="background: #739acf">
            300
            <div class="v">#739ACF</div>
          </div>
          <div class="sw" style="background: #4279bd">
            400
            <div class="v">#4279BD</div>
          </div>
          <div class="sw" style="background: #2461af; outline: 2px solid var(--srm-orange-500); outline-offset: 2px">
            500
            <div class="v">#2461AF</div>
          </div>
          <div class="sw" style="background: #1d4f8f">
            600
            <div class="v">#1D4F8F</div>
          </div>
          <div class="sw" style="background: #173e72">
            700
            <div class="v">#173E72</div>
          </div>
          <div class="sw" style="background: #112d54">
            800
            <div class="v">#112D54</div>
          </div>
          <div class="sw" style="background: #0b1d38">
            900
            <div class="v">#0B1D38</div>
          </div>
          <div class="sw" style="background: #061429">
            950
            <div class="v">#061429</div>
          </div>
        </div>
      </div>

      <div class="meta" style="margin-top: 4px">
        500 é a cor da marca · primária para ações, links e estados ativos. Nunca como fundo de página.
      </div>
    </div>
  </body>
</html>
