<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        font-weight: 500;
        color: var(--fg-2);
      }
      .input {
        font-family: var(--font-sans);
        font-size: 14px;
        padding: 9px 12px;
        border: 1px solid var(--border-default);
        border-radius: 6px;
        background: white;
        color: var(--fg-1);
        transition: all 160ms;
      }
      .input:focus {
        outline: none;
        border-color: var(--srm-blue-500);
        box-shadow: 0 0 0 3px rgba(36, 97, 175, 0.18);
      }
      .input-error {
        border-color: var(--srm-danger-500);
        box-shadow: 0 0 0 3px rgba(200, 37, 43, 0.15);
      }
      .input-disabled {
        background: var(--bg-sunken);
        color: var(--fg-disabled);
        cursor: not-allowed;
      }
      .hint {
        font-size: 11.5px;
        color: var(--fg-3);
      }
      .error-msg {
        font-size: 11.5px;
        color: var(--srm-danger-600);
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .prefix {
        display: flex;
        align-items: center;
        border: 1px solid var(--border-default);
        border-radius: 6px;
        overflow: hidden;
      }
      .prefix-text {
        background: var(--bg-surface-alt);
        padding: 9px 12px;
        font-size: 13px;
        color: var(--fg-2);
        border-right: 1px solid var(--border-default);
        font-family: var(--font-mono);
      }
      .prefix .input {
        border: 0;
        border-radius: 0;
        flex: 1;
      }
      .prefix:focus-within {
        border-color: var(--srm-blue-500);
        box-shadow: 0 0 0 3px rgba(36, 97, 175, 0.18);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row">
        <div class="field">
          <label>Razão social</label>
          <input class="input" value="SRM Capital LTDA" />
          <div class="hint">Como aparece no contrato social</div>
        </div>

        <div class="field">
          <label>Valor da duplicata</label>
          <div class="prefix">
            <div class="prefix-text">R$</div>
            <input class="input" value="12.430,50" inputmode="decimal" style="font-variant-numeric: tabular-nums" />
          </div>
          <div class="hint">Valor bruto antes da taxa</div>
        </div>

        <div class="field">
          <label>CNPJ do sacado</label>
          <input class="input input-error" value="12.345.678/0001-XX" />
          <div class="error-msg">⚠ CNPJ inválido. Verifique os dígitos.</div>
        </div>

        <div class="field">
          <label>Data de vencimento</label>
          <input class="input" value="28/04/2026" style="font-variant-numeric: tabular-nums" />
          <div class="hint">Mínimo 5 dias a partir de hoje</div>
        </div>

        <div class="field">
          <label>Conta bancária</label>
          <select class="input">
            <option>Banco do Brasil · ag. 1234-5 · cc. 67890-1</option>
          </select>
        </div>

        <div class="field">
          <label>Campo bloqueado</label>
          <input class="input input-disabled" value="Aguardando aprovação" disabled />
        </div>
      </div>
    </div>
  </body>
</html>
