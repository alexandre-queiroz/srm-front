<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 12px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
      }
      .item svg {
        width: 24px;
        height: 24px;
        color: var(--fg-2);
        stroke-width: 1.5;
      }
      .name {
        font-size: 10.5px;
        font-family: var(--font-mono);
        color: var(--fg-3);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="t-eyebrow">Lucide Icons · stroke 1.5 · ícones-chave da plataforma</div>

      <div class="grid">
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          <div class="name">FileText</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
            <polyline points="17 6 23 6 23 12" />
          </svg>
          <div class="name">TrendingUp</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4" />
            <path d="M3 5v14a2 2 0 0 0 2 2h16v-5" />
            <path d="M18 12a2 2 0 0 0 0 4h4v-4Z" />
          </svg>
          <div class="name">Wallet</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 17V3" />
            <path d="m6 11 6 6 6-6" />
            <path d="M19 21H5" />
          </svg>
          <div class="name">ArrowDownToLine</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 3v14" />
            <path d="m18 9-6-6-6 6" />
            <path d="M5 21h14" />
          </svg>
          <div class="name">ArrowUpFromLine</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">

            <path d="M10 6h4M10 10h4M10 14h4M10 18h4" />
          </svg>
          <div class="name">Building2</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />

          </svg>
          <div class="name">ShieldCheck</div>
        </div>

        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <div class="name">Clock</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10" />
            <polyline points="9 12 11 14 15 10" />
          </svg>
          <div class="name">CircleCheck</div>
        </div>

          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />

          <div class="name">CircleAlert</div>
        </div>

          </svg>
          <div class="name">Receipt</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="3" y1="3" x2="3" y2="21" />
            <line x1="3" y1="21" x2="21" y2="21" />
            <rect x="7" y="13" width="3" height="6" />
            <rect x="13" y="9" width="3" height="10" />
            <rect x="19" y="5" width="0" height="14" />
          </svg>
          <div class="name">BarChart3</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.36.39.86.62 1.39.62H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"

        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <div class="name">Search</div>
        </div>
        <div class="item">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
          </svg>
          <div class="name">Bell</div>
        </div>
      </div>

      <div class="meta">
        Carregue via <span class="meta-strong">lucide-react</span> em produção ou
        <span class="meta-strong">unpkg.com/lucide@latest</span> em protótipos.
      </div>
    </div>
  </body>
</html>
