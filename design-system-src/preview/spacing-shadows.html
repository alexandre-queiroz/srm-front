<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
        padding: 16px 8px 28px;
        background: var(--bg-canvas);
        border-radius: 8px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .box {
        width: 80px;
        height: 80px;
        background: white;
        border-radius: 8px;
      }
      .name {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--fg-2);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="t-eyebrow">Elevation · sombras suaves tintadas em azul-950</div>

      <div class="grid">
        <div class="item">
          <div class="box" style="box-shadow: 0 1px 2px rgba(11, 29, 56, 0.04)"></div>
          <div class="name">shadow-xs</div>
        </div>
        <div class="item">
          <div
            class="box"
            style="
              box-shadow:
                0 1px 2px rgba(11, 29, 56, 0.05),
                0 1px 3px rgba(11, 29, 56, 0.06);
            "
          ></div>
          <div class="name">shadow-sm</div>
        </div>
        <div class="item">
          <div
            class="box"
            style="
              box-shadow:
                0 2px 4px rgba(11, 29, 56, 0.05),
                0 4px 12px rgba(11, 29, 56, 0.08);
            "
          ></div>
          <div class="name">shadow-md</div>
        </div>
        <div class="item">
          <div
            class="box"
            style="
              box-shadow:
                0 4px 8px rgba(11, 29, 56, 0.06),
                0 12px 28px rgba(11, 29, 56, 0.1);
            "
          ></div>
          <div class="name">shadow-lg</div>
        </div>
        <div class="item">
          <div
            class="box"
            style="
              box-shadow:
                0 8px 16px rgba(11, 29, 56, 0.08),
                0 24px 56px rgba(11, 29, 56, 0.12);
            "
          ></div>
          <div class="name">shadow-xl</div>
        </div>
      </div>

      <div class="meta">xs em headers · sm em cards · md em dropdowns · lg em popovers · xl em modais</div>
    </div>
  </body>
</html>
