<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      body {
        background: var(--bg-canvas);
      }
      .demo {
        padding: 18px 0;
      }
      .ui-card {
        background: white;
        border: 1px solid var(--border-subtle);
        border-radius: 10px;
        padding: 20px;
        box-shadow:
          0 1px 2px rgba(11, 29, 56, 0.05),
          0 1px 3px rgba(11, 29, 56, 0.06);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--fg-3);
      }
      .kpi {
        font-size: 30px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.05;
        font-variant-numeric: tabular-nums;
        margin-top: 6px;
      }
      .delta {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        background: #e8f6ee;
        color: #11572f;
        font-weight: 500;
        margin-left: 8px;
        font-variant-numeric: tabular-nums;
      }
      .meta-info {
        font-size: 12px;
        color: var(--fg-3);
        margin-top: 4px;
      }
      .feature-card {
        background: white;
        border-radius: 10px;
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow:
          0 1px 2px rgba(11, 29, 56, 0.05),
          0 1px 3px rgba(11, 29, 56, 0.06);
        border: 1px solid var(--border-subtle);
      }
      .feature-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: var(--srm-blue-50);
        color: var(--srm-blue-600);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .feature-icon svg {
        width: 22px;
        height: 22px;
        stroke-width: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="card" style="background: var(--bg-canvas)">
      <div class="row">
        <div class="ui-card">
          <div class="eyebrow">Total a receber</div>
          <div class="kpi">R$ 1.284.430,50<span class="delta">+8,4%</span></div>
          <div class="meta-info">23 duplicatas em aberto · vencimento médio em 18 dias</div>
        </div>
        <div class="ui-card">
          <div class="eyebrow">Taxa média</div>
          <div class="kpi">1,49% <span style="font-size: 18px; color: var(--fg-2); font-weight: 500">a.m.</span></div>
          <div class="meta-info">Comparado a 1,62% no mês anterior</div>
        </div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
        </div>
        <div style="flex: 1">
          <div style="font-weight: 600; font-size: 14px">Duplicata Nº 000.182-3</div>
          <div style="font-size: 12.5px; color: var(--fg-3); margin-top: 2px">Sacado: Construtora Horizonte · Vence em 28 abr 2026</div>
        </div>
        <div style="text-align: right; font-variant-numeric: tabular-nums">
          <div style="font-weight: 600; font-size: 15px">R$ 12.430,50</div>
          <div style="font-size: 11.5px; color: var(--fg-3)">bruto</div>
        </div>
      </div>
    </div>
  </body>
</html>
