<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .label {
        width: 70px;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-3);
      }
      .bar {
        background: var(--srm-blue-500);
        height: 16px;
        border-radius: 2px;
      }
      .value {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-2);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="t-eyebrow">Spacing scale · grid de 4px</div>

      <div class="row">
        <div class="label">space-1</div>
        <div class="bar" style="width: 4px"></div>
        <div class="value">4 px</div>
      </div>
      <div class="row">
        <div class="label">space-2</div>
        <div class="bar" style="width: 8px"></div>
        <div class="value">8 px</div>
      </div>
      <div class="row">
        <div class="label">space-3</div>
        <div class="bar" style="width: 12px"></div>
        <div class="value">12 px</div>
      </div>
      <div class="row">
        <div class="label">space-4</div>
        <div class="bar" style="width: 16px"></div>
        <div class="value">16 px</div>
      </div>
      <div class="row">
        <div class="label">space-5</div>
        <div class="bar" style="width: 20px"></div>
        <div class="value">20 px</div>
      </div>
      <div class="row">
        <div class="label">space-6</div>
        <div class="bar" style="width: 24px"></div>
        <div class="value">24 px</div>
      </div>
      <div class="row">
        <div class="label">space-8</div>
        <div class="bar" style="width: 32px"></div>
        <div class="value">32 px</div>
      </div>
      <div class="row">
        <div class="label">space-10</div>
        <div class="bar" style="width: 40px"></div>
        <div class="value">40 px</div>
      </div>
      <div class="row">
        <div class="label">space-12</div>
        <div class="bar" style="width: 48px"></div>
        <div class="value">48 px</div>
      </div>
      <div class="row">
        <div class="label">space-16</div>
        <div class="bar" style="width: 64px"></div>
        <div class="value">64 px</div>
      </div>
      <div class="row">
        <div class="label">space-20</div>
        <div class="bar" style="width: 80px"></div>
        <div class="value">80 px</div>
      </div>
      <div class="row">
        <div class="label">space-24</div>
        <div class="bar" style="width: 96px"></div>
        <div class="value">96 px</div>
      </div>
    </div>
  </body>
</html>
