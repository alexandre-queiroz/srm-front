<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .swatch-row {
        display: grid;
        grid-template-columns: repeat(13, 1fr);
        gap: 3px;
      }
      .sw {
        aspect-ratio: 1 / 1.1;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 5px;
        font-family: var(--font-mono);
        font-size: 8.5px;
        color: white;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
      }
      .sw.light {
        color: var(--srm-neutral-900);
      }
      .sw .v {
        opacity: 0.8;
      }
      .label {
        font-size: 12px;
        color: var(--fg-2);
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-weight: 500;
      }
      .label small {
        color: var(--fg-3);
        font-family: var(--font-mono);
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div>
        <div class="label">Neutros <small>--srm-neutral-*</small></div>
        <div class="swatch-row" style="margin-top: 8px">
          <div class="sw light" style="background: #ffffff; box-shadow: inset 0 0 0 1px var(--border-default)">
            0
            <div class="v">FFFFFF</div>
          </div>
          <div class="sw light" style="background: #fafbfc">
            25
            <div class="v">FAFBFC</div>
          </div>
          <div class="sw light" style="background: #f4f6f8">
            50
            <div class="v">F4F6F8</div>
          </div>
          <div class="sw light" style="background: #e9ecf1">
            100
            <div class="v">E9ECF1</div>
          </div>
          <div class="sw light" style="background: #d5dae2">
            200
            <div class="v">D5DAE2</div>
          </div>
          <div class="sw light" style="background: #b3bbc7">
            300
            <div class="v">B3BBC7</div>
          </div>
          <div class="sw" style="background: #8a93a2">
            400
            <div class="v">8A93A2</div>
          </div>
          <div class="sw" style="background: #646c7a">
            500
            <div class="v">646C7A</div>
          </div>
          <div class="sw" style="background: #4a515c">
            600
            <div class="v">4A515C</div>
          </div>
          <div class="sw" style="background: #353a43">
            700
            <div class="v">353A43</div>
          </div>
          <div class="sw" style="background: #232730">
            800
            <div class="v">232730</div>
          </div>
          <div class="sw" style="background: #14171d">
            900
            <div class="v">14171D</div>
          </div>
          <div class="sw" style="background: #0a0c11">
            950
            <div class="v">0A0C11</div>
          </div>
        </div>
      </div>

      <div class="meta" style="margin-top: 4px">Neutros levemente frios para harmonizar com o azul da marca.</div>
    </div>
  </body>
</html>
